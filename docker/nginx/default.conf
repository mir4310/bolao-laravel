server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Logs (stdout/stderr para o Docker capturar)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Tamanho máximo de upload — ajuste conforme necessário
    client_max_body_size 100M;

    # -------------------------------------------------------
    # Tenta servir o arquivo estático; se não existir,
    # repassa para o index.php (roteamento do Laravel)
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------
    # Arquivos estáticos: cache longo, sem passar pelo PHP
    # -------------------------------------------------------
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------
    # Passa requisições PHP para o PHP-FPM
    # -------------------------------------------------------
    location ~ \.php$ {
        # Evita o bug de segurança PATH_INFO
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;

        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;

        # Repassa o header X-Forwarded-Proto do Traefik
        # para o Laravel enxergar HTTPS corretamente
        fastcgi_param  HTTPS           $http_x_forwarded_proto if_not_empty;

        # Timeouts — ajuste conforme necessidade
        fastcgi_read_timeout 120;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout 120;
    }

    # -------------------------------------------------------
    # Bloqueia acesso a arquivos sensíveis
    # -------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(env|log|sh|sql|bak|conf)$ {
        deny all;
    }
}