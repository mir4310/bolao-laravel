name: Build
on: 
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true
  push:
    branches: [  ]
  pull_request:
    branches: [  ]
jobs:

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login Github
      run: docker login ghcr.io --username arthurbentivenha --password=${{ secrets.REGISTRY }}
    - name: Criando a Imagem
      run: docker build -t bolao .
    - name: Tag na imagem
      run: docker tag api ghcr.io/mir4310/bolao-laravel/bolao:${{github.run_number}}
    - name: Publicando a imagem no Docker
      run: docker push ghcr.io/mir4310/bolao-laravel/bolao:${{github.run_number}}
